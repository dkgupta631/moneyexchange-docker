services:
  app:
    build:
      context: .
      target: app
    container_name: moneyexchange_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_storage:/var/www/html/storage
      - public_files:/var/www/html/public
    networks:
      - moneyexchange

  nginx:
    build:
      context: ./docker/nginx
    container_name: moneyexchange_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - public_files:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - moneyexchange

volumes:
  app_storage:
  public_files:

networks:
  moneyexchange:
    driver: bridge
