# Development overrides — picked up automatically by docker compose.
# Replaces the named public_files volume with a bind mount so that
# the hot file created by `npm run dev` on the host is visible to PHP,
# making Laravel serve assets from the Vite dev server.
services:
  app:
    volumes:
      - app_storage:/var/www/html/storage
      - ./public:/var/www/html/public

  nginx:
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
